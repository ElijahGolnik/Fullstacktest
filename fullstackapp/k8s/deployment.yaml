apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: elijahgolnik/myapp:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "0.5"
            memory: "700Mi"