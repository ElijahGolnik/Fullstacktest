apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: elijahgolnik/myapp:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "2.0"
            memory: "4096Mi"